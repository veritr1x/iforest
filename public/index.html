<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>iForest</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone" role="application" aria-label="iForest WAP game">
      <header class="chrome-bar">
        <a class="repo-link" href="https://github.com/veritr1x/iforest" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <span class="bar-title">iForest</span>
        <button id="menu-button" class="chrome-key" type="button">Menu</button>
      </header>

      <main class="screen" id="screen" tabindex="-1">
        <p class="eyebrow" aria-hidden="true">wap.useeverything.com / iforest</p>

        <p id="player-line" class="status-line"></p>
        <p id="world-line" class="status-line dim"></p>

        <h2 id="room-title" class="room-title">iForest</h2>
        <figure class="room-figure">
          <img id="room-image" alt="" hidden />
        </figure>
        <p id="room-description" class="room-description"></p>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </main>

      <section class="composer" aria-label="Commands">
        <div id="armed-row" class="armed-row" hidden>
          <span>Pick object for <strong id="armed-verb"></strong></span>
          <button type="button" id="armed-cancel" class="ghost-key" aria-label="Cancel">x</button>
        </div>
        <div id="direction-row" class="key-row directions" role="group" aria-label="Directions"></div>
        <div id="verb-row" class="key-row verbs" role="group" aria-label="Actions"></div>
        <div id="object-row" class="key-row verbs" role="group" aria-label="Objects" hidden></div>
      </section>

      <nav class="tab-bar" aria-label="Status panels">
        <button class="tab-key" type="button" data-panel="inventory">Inv</button>
        <button class="tab-key" type="button" data-panel="here">Here</button>
        <button class="tab-key" type="button" data-panel="map">Map</button>
      </nav>

      <aside id="sheet" class="sheet" hidden aria-label="Status panel">
        <header class="sheet-header">
          <h2 id="sheet-title">Inventory</h2>
          <button type="button" id="sheet-close" class="ghost-key" aria-label="Close panel">x</button>
        </header>
        <div id="sheet-body" class="sheet-body"></div>
      </aside>
    </div>

    <dialog id="menu-dialog" class="menu-dialog" aria-label="New game">
      <form id="start-form" class="menu-form">
        <h2>New game</h2>
        <label>
          Player name
          <input id="player-name" name="name" maxlength="12" value="Jane" autocomplete="off" />
        </label>
        <div class="menu-actions">
          <button type="button" id="menu-cancel">Cancel</button>
          <button type="submit">Start</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
